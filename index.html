<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扫雷</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div>
          <p class="eyebrow">Minesweeper</p>
          <h1>扫雷</h1>
          <p class="subtitle">一个先从基础规则开始的原型版本。</p>
        </div>

        <div class="status-card">
          <div class="status-item">
            <span class="label">状态</span>
            <strong id="game-status">准备开始</strong>
          </div>
          <div class="status-item">
            <span class="label">剩余地雷</span>
            <strong id="mine-count">10</strong>
          </div>
        </div>

        <div class="actions">
          <button id="reset-btn" type="button">重新开始</button>
        </div>

        <ul class="legend">
          <li>左键：翻开格子</li>
          <li>右键：插旗 / 取消插旗</li>
          <li>清空所有非地雷格子即可胜利</li>
        </ul>
      </section>

      <section class="board-wrap">
        <div id="board" class="board" aria-label="扫雷棋盘"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
