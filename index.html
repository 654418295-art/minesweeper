<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扫雷</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div>
          <p class="eyebrow">Minesweeper</p>
          <h1>扫雷</h1>
          <p class="subtitle">一个先从基础规则开始的原型版本。</p>
        </div>

        <div class="info-card">
          <p class="card-title">分数</p>
          <div class="score-value" id="score-count">0</div>
        </div>

        <div class="info-card status-card">
          <p class="card-title">游戏信息</p>
          <div class="status-item">
            <span class="label">关卡</span>
            <strong id="level-count">1 / 10</strong>
          </div>
          <div class="status-item">
            <span class="label">状态</span>
            <strong id="game-status">准备开始</strong>
          </div>
          <div class="status-item">
            <span class="label">剩余地雷</span>
            <strong id="mine-count">10</strong>
          </div>
        </div>

        <div class="actions">
          <button id="reset-btn" type="button">重新开始</button>
        </div>

        <div class="info-card">
          <p class="card-title">操作说明</p>
          <ul class="legend">
            <li>方向键：移动当前选中格子</li>
            <li>数字键 1：翻开格子</li>
            <li>数字键 2：插旗 / 取消插旗</li>
            <li>一共 10 关，胜利后自动进入下一关</li>
            <li>清空所有非地雷格子即可胜利</li>
          </ul>
        </div>
      </section>

      <section class="board-wrap">
        <div id="board" class="board" aria-label="扫雷棋盘"></div>
        <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
        <div id="board-overlay" class="board-overlay" hidden aria-live="polite"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
